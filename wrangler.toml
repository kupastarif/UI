name = "calc"
compatibility_date = "2026-07-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[env.production]
routes = [
  { pattern = "calc.kupastarif.workers.dev", zone_name = "kupastarif.workers.dev" }
]

[build]
command = "bun install"
cwd = "./"
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"
main = "./index.html"

[assets]
directory = "."
exclude = [
  "node_modules",
  ".git",
  ".github",
  ".gitignore",
  "package.json",
  "package-lock.json",
  "bun.lock",
  "bun.lockb",
  ".env",
  ".env.*",
  ".wrangler",
  "wrangler.toml",
  "wrangler.jsonc",
  "README.md",
  "*.sh",
  "node_modules/**"
]
