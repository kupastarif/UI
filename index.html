        window.isDevMode = true;            // false untuk production

        // ---------- CACHE BUST HANYA SAAT DEV MODE ----------
        if (window.isDevMode) {
            var CACHE_BUST = Date.now();
            window.CACHE_BUST = CACHE_BUST;   // ekspor agar init.js bisa membaca
            document.write('<link rel="stylesheet" href="assets/css/main.css?v=' + CACHE_BUST + '">');
            document.write('<link rel="stylesheet" href="assets/css/components.css?v=' + CACHE_BUST + '">');
            document.write('<link rel="stylesheet" href="assets/css/pages.css?v=' + CACHE_BUST + '">');
        } else {
            // Tanpa cache bust (production)
            document.write('<link rel="stylesheet" href="assets/css/main.css">');
            document.write('<link rel="stylesheet" href="assets/css/components.css">');
            document.write('<link rel="stylesheet" href="assets/css/pages.css">');
        }

        // ---------- BASE URL UNTUK SCRIPT DINAMIS (fallback) ----------
        // Akan di-override oleh init.js jika ada, tapi kita set fallback dari lokasi
        (function() {
            if (!window.APP_FULL_BASE) {
                var path = window.location.pathname;
                // Hapus bagian setelah trailing slash terakhir untuk mendapatkan base path
                var base = path.replace(/\/[^/]*$/, '/');
                window.APP_FULL_BASE = window.location.origin + base;
            }
        })();
    </script>

    <!-- Script untuk update meta canonical, og:url, dan gambar secara dinamis -->
    <script>
        (function() {
            var baseUrl = window.APP_FULL_BASE || window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
            if (!baseUrl.endsWith('/')) baseUrl += '/';

            var imageUrl = baseUrl + 'assets/img/og.jpg';

            // Update canonical
            var canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) {
                canonical.href = baseUrl;
            } else {
                var link = document.createElement('link');
                link.rel = 'canonical';
                link.href = baseUrl;
                document.head.appendChild(link);
            }

            // Update og:url
            var ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = baseUrl;

            // Update og:image
            var ogImage = document.querySelector('meta[property="og:image"]');
            if (ogImage) ogImage.content = imageUrl;

            // Update twitter:image
            var twImage = document.querySelector('meta[name="twitter:image"]');
            if (twImage) twImage.content = imageUrl;
        })();
    </script>

    <!-- =================================================================
         SERVICE WORKER REGISTRATION (dengan dev mode handling)
         ================================================================= -->
    <script>
        if ('serviceWorker' in navigator) {
            if (window.isDevMode) {
                // --- Development Mode: hapus semua service worker & cache ---
                // Unregister service worker yang sudah terdaftar
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    registrations.forEach(function(registration) {
                        registration.unregister();
                        console.log('[DEV] Service Worker unregistered');
                    });
                });
                // Hapus semua cache yang tersimpan
                if ('caches' in window) {
                    caches.keys().then(function(cacheNames) {
                        cacheNames.forEach(function(cacheName) {
                            caches.delete(cacheName);
                            console.log('[DEV] Cache deleted:', cacheName);
                        });
                    });
                }
            } else {
                // --- Production Mode: daftarkan service worker normal ---
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('/sw.js').then(function(reg) {
                        console.log('Service Worker registered with scope:', reg.scope);
                    }).catch(function(err) {
                        console.error('Service Worker registration failed:', err);
                    });
                });
            }
        }
    </script>
    
<!-- ============================================================
     NATIVE BRIDGE UNTUK CAPACITOR (GPS BACKGROUND - CapGo)
     ============================================================ -->
<script>
(function() {
    'use strict';

    // Deteksi Capacitor
    if (typeof Capacitor === 'undefined' && typeof window.Capacitor !== 'undefined') {
        var Capacitor = window.Capacitor;
    }
    if (!Capacitor || !Capacitor.isNative) {
        console.log('[Bridge] Bukan Capacitor, GPS web digunakan.');
        return;
    }

    console.log('[Bridge] Mode Android: Mengaktifkan GPS background (CapGo)...');

    async function initNative() {
        try {
            const BackgroundGeolocation = Capacitor.Plugins['@capgo/background-geolocation'];
            const { Geolocation, LocalNotifications, App } = Capacitor.Plugins;

            if (!BackgroundGeolocation) {
                console.warn('[Bridge] Plugin @capgo/background-geolocation tidak ditemukan.');
                return;
            }

            // Izin
            await Geolocation.requestPermissions();
            if (typeof BackgroundGeolocation.requestPermissions === 'function') {
                await BackgroundGeolocation.requestPermissions();
            }

            // Konfigurasi High Accuracy
            await BackgroundGeolocation.configure({
                desiredAccuracy: 0,
                distanceFilter: 10,
                stopOnTerminate: false,
                startOnBoot: true,
                notificationTitle: '⚡ KupasTarif',
                notificationText: 'Merekam perjalanan akurasi tinggi...',
                notificationIcon: 'ic_notification',
                notificationIconColor: '#0d7c4a'
            });

            // Listener posisi → kirim ke modul tracking
            BackgroundGeolocation.addListener('location', (location) => {
                const pos = {
                    lat: location.latitude || location.coords?.latitude,
                    lng: location.longitude || location.coords?.longitude,
                    accuracy: location.accuracy || location.coords?.accuracy || 10,
                    timestamp: location.timestamp || Date.now()
                };
                if (window.__trackingCalculate) {
                    window.__trackingCalculate.addPosition(pos.lat, pos.lng, pos.accuracy, pos.timestamp);
                } else {
                    window.__lastNativePos = pos;
                }
            });

            // Error
            BackgroundGeolocation.addListener('error', (error) => {
                console.error('[Bridge] GPS Error:', error);
                LocalNotifications.schedule({
                    notifications: [{
                        id: 999,
                        title: '⚠️ Gagal Lokasi',
                        body: error.message || 'Periksa GPS dan izin aplikasi.',
                        schedule: { at: new Date(Date.now() + 500) }
                    }]
                });
            });

            // State app
            App.addListener('appStateChange', async (state) => {
                if (!state.isActive && window.__nativeBG && window.__nativeBG._started) {
                    try { await BackgroundGeolocation.start(); } catch(e) {}
                }
            });
            
            // Global start/stop (optional)
            window.__nativeBG = {
                start: async () => {
                    if (!window.__nativeBG._started) {
                        await BackgroundGeolocation.start();
                        window.__nativeBG._started = true;
                        await LocalNotifications.schedule({
                            notifications: [{
                                id: 1,
                                title: '🟢 Tracking Dimulai',
                                body: 'GPS aktif dengan akurasi tinggi.',
                                schedule: { at: new Date(Date.now() + 500) }
                            }]
                        });
                    }
                },
                stop: async () => {
                    if (window.__nativeBG._started) {
                        await BackgroundGeolocation.stop();
                        window.__nativeBG._started = false;
                        await LocalNotifications.cancel({ notifications: [{ id: 1 }] });
                    }
                },
                _started: false
            };

            console.log('[Bridge] Native GPS (CapGo) siap digunakan.');

        } catch (err) {
            console.error('[Bridge] Gagal init plugin:', err);
        }
    }

    if (document.readyState === 'complete') {
        initNative();
    } else {
        window.addEventListener('load', initNative);
    }
})();
</script>
