// ==================== INPUT BUILDING ====================
function getRawValues() {
    const raw = {};
    const inputIds = [
        'in-E10','in-E12','in-E20','in-E22','in-E24','in-E26','in-E28',
        'in-E36','in-E38','in-E40','in-E46','in-E54','in-E56','in-E58','in-E60',
        'in-E68','in-E70','in-E71',
        'in-E78','in-E80','in-E82','in-E84','in-E92','in-E100','in-E102','in-E104'
    ];
    inputIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const cellId = id.replace('in-', '');
        const val = el.value.trim();
        if (val === '') {
            raw[cellId] = null;
        } else if (el.tagName === 'SELECT') {
            raw[cellId] = val;
        } else {
            const num = parseFloat(val);
            raw[cellId] = isNaN(num) ? val : num;
        }
    });
    return raw;
}

    return {
        E10: raw.E10, E12: raw.E12, E20: raw.E20,

}

// ==================== UI HELPERS ====================
function fmt(v) {
    if (v === null || v === undefined) return '<span class="cell-none">null</span>';
    if (v === 0) return '0';
    if (typeof v === 'number') {
        if (!isFinite(v)) return '<span class="cell-none">∞</span>';
        return Number.isInteger(v) ? v.toLocaleString('id-ID') : v.toFixed(6);
    }
    if (Array.isArray(v)) return '[ ' + v.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(', ') + ' ]';
    if (typeof v === 'object') return JSON.stringify(v);
    return String(v);
}

function fmtRaw(v) {
    if (v === null || v === undefined) return '<span class="cell-none">null</span>';
    if (typeof v === 'number') return v.toLocaleString('id-ID');
    return String(v);
}

function fmtPlain(v) {
    if (v === null || v === undefined) return null;
    if (typeof v === 'number') {
        if (!isFinite(v)) return null;
        return Number.isInteger(v) ? v : parseFloat(v.toFixed(6));
    }
    return v;
}

// ==================== COPY TEMPLATE ====================
function copyTemplate() {
    const json = JSON.stringify(TEMPLATE_JSON, null, 2);
    navigator.clipboard.writeText(json).then(() => {
        alert('✅ Template JSON disalin ke clipboard.');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = json;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); alert('✅ Template JSON disalin ke clipboard.'); }
        catch (ex) { alert('❌ Gagal menyalin ke clipboard.'); }
        document.body.removeChild(ta);
    });
}

// ==================== COPY ALL DATA ====================
function copyAllData(btn) {
    if (!window._lastCopyData) {
        alert('Data belum tersedia. Silakan klik HITUNG terlebih dahulu.');
        return;
    }
    const json = JSON.stringify(window._lastCopyData, null, 2);
    navigator.clipboard.writeText(json).then(() => {
        btn.textContent = '✅ COPIED!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 COPY ALL DATA'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = json;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); btn.textContent = '✅ COPIED!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 COPY ALL DATA'; btn.classList.remove('copied'); }, 2000); } catch (ex) { btn.textContent = '❌ GAGAL'; }
        document.body.removeChild(ta);
    });
}

// ==================== RENDER ALL CELLS DUMP ====================
function renderAllCellsDump(c, result, valid, raw, cm, fn, source, jsonError) {
    const d = document.createElement('div');
    d.className = 'card';
    const did = 'ac-' + Date.now();
    let h = '<div class="card-header" onclick="toggleCard(this)"><h3><span class="badge badge-all">ALL CELLS DUMP</span> Semua Cell v1.0.1‑beta</h3><span class="toggle-icon">▼</span></div>';
    h += '<div class="card-body">';

    const sourceLabel = source === 'json' ? 'JSON' : 'Form';
    const sourceClass = source === 'json' ? 'badge-json' : 'badge-form';
    h += `<div class="info-banner">🗄️ <strong>${cm.toUpperCase()}</strong> · <strong>${fn}</strong> · Sumber Input: <span class="badge ${sourceClass}">${sourceLabel}</span> · null = tidak dihitung</div>`;

    if (jsonError) {
        h += `<div class="error-banner">⚠️ ${jsonError}</div>`;
    }

    h += `<input type="text" class="search-box" placeholder="🔍 Cari cell..." oninput="filterAC('${did}',this.value)" id="s-${did}"><p class="search-info" id="i-${did}">Menampilkan semua cell</p>`;
    h += '<div class="table-wrapper-all"><table id="' + did + '"><thead><tr><th>Cell</th><th>Keterangan</th><th>Input Raw</th><th>Value</th></tr></thead><tbody>';

    let ct = 0, cnn = 0;

    INPUT_CELLS.forEach(cell => {
        ct++;
        const label = L[cell] || '';
        const rawVal = raw[cell] !== undefined ? raw[cell] : null;
        const val = valid[cell] !== undefined ? valid[cell] : (result[cell] !== undefined ? result[cell] : null);
        const cs = (val === null || val === undefined) ? 'cell-zeronull' : '';
        if (val !== null && val !== undefined && val !== 0) cnn++;
        h += `<tr data-cell="${cell}"><td>${cell}</td><td>${label}</td><td>${fmtRaw(rawVal)}</td><td class="${cs}">${fmt(val)}</td></tr>`;
    });

    h += '<tr class="cell-spacer"><td colspan="4"></td></tr>';

    OUTPUT_CELLS.forEach(cell => {
        if (cell === null) {
            h += '<tr class="cell-spacer"><td colspan="4"></td></tr>';
            return;
        }
        ct++;
        const label = L[cell] || '';
        let val = result[cell];
        if (val === undefined) val = (valid && valid[cell] !== undefined) ? valid[cell] : null;
        let cs = HL.includes(cell) ? 'cell-highlight' : '';
        if (val === null || val === undefined) cs += ' cell-zeronull';
        else if (val === 0) cs += ' cell-zeronull';
        else cnn++;
        if ((cell === 'E981' || cell === 'E969') && val < 0) cs += ' cell-danger';
        h += `<tr data-cell="${cell}"><td>${cell}</td><td>${label}</td><td>–</td><td class="${cs}">${fmt(val)}</td></tr>`;
    });

    h += '</tbody></table></div>';
    h += `<p style="font-size:10px;color:#64748b;margin-top:4px">Total: ${ct} cell · Non-null: ${cnn} · Null/0: ${ct - cnn}</p>`;
    h += `<button class="btn-copy" onclick="copyAllData(this)">📋 COPY ALL DATA</button>`;
    h += '</div>';
    d.innerHTML = h;
    c.appendChild(d);
}

function filterAC(tid, q) {
    const tb = document.getElementById(tid);
    if (!tb) return;
    const rows = tb.querySelectorAll('tbody tr');
    let cnt = 0, ttl = 0;
    q = q.trim().toLowerCase();
    rows.forEach(r => {
        if (r.classList.contains('cell-spacer')) return;
        ttl++;
        const cl = (r.dataset.cell || '').toLowerCase();
        if (!q || cl.includes(q)) { r.classList.remove('row-hidden'); cnt++; }
        else { r.classList.add('row-hidden'); }
    });
    const ie = document.getElementById('i-' + tid);
    if (ie) ie.textContent = q ? cnt + ' dari ' + ttl + ' cell' : 'Menampilkan semua cell';
}

// ==================== MAIN CALCULATION ====================
function doCalculate() {
    const fn = document.getElementById('func-select').value;
    const cm = document.getElementById('cache-select').value;

    try { Cache.setMode(cm); } catch(e) {}

    let raw, homeRaw, orderRaw, realityRaw, source = 'form', jsonError = null;

    const jsonText = document.getElementById('json-textarea').value.trim();
    if (jsonText !== '') {
        try {
            const parsed = JSON.parse(jsonText);
            if (parsed && typeof parsed === 'object') {
                source = 'json';
                raw = parsed.input || {};
                INPUT_CELLS.forEach(c => { if (!(c in raw)) raw[c] = null; });
                const fnOverride = parsed.function;
                const cmOverride = parsed.cache;
                if (fnOverride && document.getElementById('func-select').querySelector(`option[value="${fnOverride}"]`)) {
                    document.getElementById('func-select').value = fnOverride;
                }
                if (cmOverride && document.getElementById('cache-select').querySelector(`option[value="${cmOverride}"]`)) {
                    document.getElementById('cache-select').value = cmOverride;
                }
            } else {
                throw new Error('Format JSON tidak valid');
            }
        } catch (e) {
            jsonError = 'JSON tidak valid, menggunakan input form.';
            source = 'form';
            raw = getRawValues();
        }
    } else {
        raw = getRawValues();
    }

    const finalFn = document.getElementById('func-select').value;
    const finalCm = document.getElementById('cache-select').value;
    try { Cache.setMode(finalCm); } catch(e) {}

    homeRaw = buildHomeInput(raw);
    orderRaw = buildOrderInput(raw);
    realityRaw = buildRealityInput(raw);

    let home, order, reality, valid;
    try {
        home = Engine.Valid.validateHome(homeRaw);
        order = Engine.Valid.validateOrder(orderRaw, home);
        reality = Engine.Valid.validateReality(realityRaw);
        valid = Object.assign({}, home, order, reality);

        Object.keys(valid).forEach(cell => {
            const inputEl = document.getElementById('in-' + cell);
            if (inputEl) {
                const newVal = String(valid[cell]);
                if (inputEl.value !== newVal) {
                    inputEl.value = newVal;
                }
            }
        });
    } catch (e) {
        home = homeRaw; order = orderRaw; reality = realityRaw;
        valid = Object.assign({}, home, order, reality);
    }

    const oa = document.getElementById('output-area');
    oa.innerHTML = '';
    try {
        let r = null;
        switch (finalFn) {
            case 'estimatePickup':
                r = Cache.estimatePickup(valid, raw.E71);
                break;
            case 'estimateDropoff':
                { const pickup = Cache.estimatePickup(valid, raw.E71);
                  r = Cache.estimateDropoff(valid, pickup); }
                break;
            case 'realityPickup':
                { const est = Cache.estimateDropoff(valid, Cache.estimatePickup(valid, raw.E71));
                  r = Cache.realityPickup(valid, est); }
                break;
            case 'realityDropoff':
                { const pickupEst = Cache.estimatePickup(valid, raw.E71);
                  const est = Cache.estimateDropoff(valid, pickupEst);
                  const rp = Cache.realityPickup(valid, est);
                  r = Cache.realityDropoff(valid, est, rp); }
                break;
            case 'reality':
                { const est = Cache.estimateDropoff(valid, Cache.estimatePickup(valid, raw.E71));
                  r = Cache.reality(valid, est, raw.E71); }
                break;
            case 'complete':
                r = Cache.complete(valid, raw.E71);
                break;
            case 'getOperationalCost':
                { const dist = (valid.E78 || 5) + (valid.E82 || 5);
                  const time = (valid.E80 || 15) + (valid.E84 || 15);
                  r = Cache.getOperationalCost(valid, dist, time); }
                break;
            default: r = null;
        }
        window._lastResult = r;
        window._lastValid = valid;
        window._lastRaw = raw;

        const copyData = {
            meta: {
                function: finalFn,
                cache: finalCm,
                source: source
            },
            input: {
                raw: {},
                validated: {}
            },
            output: {}
        };
        INPUT_CELLS.forEach(c => {
            copyData.input.raw[c] = raw[c];
            copyData.input.validated[c] = valid[c] !== undefined ? fmtPlain(valid[c]) : null;
        });
        if (r && typeof r === 'object') {
            OUTPUT_CELLS.forEach(c => {
                if (c === null) return;
                let val = r[c];
                if (val === undefined) val = valid[c] !== undefined ? valid[c] : null;
                copyData.output[c] = fmtPlain(val);
            });
        }
        window._lastCopyData = copyData;

        renderAllCellsDump(oa, r || {}, valid, raw, finalCm, finalFn, source, jsonError);
    } catch (e) {
        oa.innerHTML = `<div class="card"><p class="cell-danger">Error: ${e.message}</p><pre style="font-size:10px">${e.stack}</pre></div>`;
        console.error(e);
    }
}

    if (typeof Engine === 'undefined' || typeof Cache === 'undefined') {
