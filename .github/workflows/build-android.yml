name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # ==============================================
      # 1. Siapkan folder public untuk web assets
      # ==============================================
      - name: Prepare web directory
        run: |
          mkdir public
          cp -r assets/ engine/ js/ index.html manifest.json sw.js public/
          echo "Web files copied to public/"

      # ==============================================
      # 2. Init Capacitor (buat capacitor.config.json)
      # ==============================================
      - name: Init Capacitor
        run: |
          npx cap init KupasTarif kupastarif.gk.app.id --web-dir=public

      # ==============================================
      # 3. Ubah webDir di capacitor.config.json
      # ==============================================
      - name: Override webDir in capacitor.config.json
        run: |
          sed -i 's/"webDir": ".*"/"webDir": "public"/' capacitor.config.json
          cat capacitor.config.json

      # ==============================================
      # 4. Tambah platform Android
      # ==============================================
      - name: Add Android platform
        run: npx cap add android

      # ==============================================
      # 5. Sync Capacitor
      # ==============================================
      - name: Sync Capacitor
        run: npx cap sync

      # ==============================================
      # 6. Copy Ikon Launcher (ke mipmap-*)
      # ==============================================
      - name: Copy Launcher Icons
        run: |
          # Buat folder mipmap jika belum ada
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # mdpi (48x48) - gunakan icon48.png
          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          # hdpi (72x72) - gunakan icon72.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png

          # xhdpi (96x96) - gunakan icon96.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png

          # xxhdpi (144x144) - gunakan icon144.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png

          # xxxhdpi (192x192) - gunakan icon192.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          echo "Launcher icons copied successfully."

      # ==============================================
      # 7. Copy Ikon Notifikasi (ke drawable)
      # ==============================================
      - name: Copy notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          # Gunakan icon72.png untuk notifikasi (ukuran 72x72)
          cp public/assets/img/icon72.png android/app/src/main/res/drawable/ic_notification.png
          echo "Notification icon copied successfully."

      # ==============================================
      # 8. Inject Izin & Service ke AndroidManifest.xml
      # ==============================================
      - name: Inject Background Permissions and Service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # ---- Tambahkan izin jika belum ada ----
          if ! grep -q "ACCESS_BACKGROUND_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "FOREGROUND_SERVICE_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "POST_NOTIFICATIONS" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          fi

          # ---- Tambahkan service jika belum ada ----
          if ! grep -q "com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" $MANIFEST; then
            sed -i '/<application>/a\        <service android:name="com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" android:permission="android.permission.BIND_JOB_SERVICE" android:foregroundServiceType="location" />' $MANIFEST
          fi

          # ---- Tampilkan hasil (opsional untuk debugging) ----
          echo "=== Final AndroidManifest.xml ==="
          cat $MANIFEST
          echo "================================"

      # ==============================================
      # 9. Build APK Debug
      # ==============================================
      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ==============================================
      # 10. Upload APK
      # ==============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kupastarif-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk