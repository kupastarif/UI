name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # ==============================================
      # 1. Siapkan folder public
      # ==============================================
      - name: Prepare web directory
        run: |
          mkdir public
          cp -r assets/ engine/ js/ index.html manifest.json sw.js public/
          echo "Web files copied to public/"

      # ==============================================
      # 2. Init Capacitor
      # ==============================================
      - name: Init Capacitor
        run: |
          npx cap init KupasTarif kupastarif.gk.app.id --web-dir=public

      # ==============================================
      # 3. Pastikan webDir = public
      # ==============================================
      - name: Set webDir to public
        run: |
          sed -i 's/"webDir": ".*"/"webDir": "public"/' capacitor.config.json
          cat capacitor.config.json

      # ==============================================
      # 4. Tambah platform Android
      # ==============================================
      - name: Add Android platform
        run: npx cap add android

      # ==============================================
      # 5. Sync Capacitor
      # ==============================================
      - name: Sync Capacitor
        run: npx cap sync

      # ==============================================
      # 6. Copy Launcher Icons (Manual)
      # ==============================================
      - name: Copy Launcher Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # ic_launcher.png (non-adaptive fallback)
          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # ic_launcher_round.png (untuk perangkat yang mendukung)
          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # ic_launcher_foreground.png (untuk adaptive icon)
          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

          echo "Launcher icons copied."

      # ==============================================
      # 7. Adaptive Icon XML (Android 8+)
      # ==============================================
      - name: Create Adaptive Icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # Tambahkan warna background di colors.xml
          mkdir -p android/app/src/main/res/values
          if ! grep -q "ic_launcher_background" android/app/src/main/res/values/colors.xml 2>/dev/null; then
            cat > android/app/src/main/res/values/colors.xml << 'EOF2'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#0a1f1a</color>
          </resources>
          EOF2
          fi

          echo "Adaptive icon created."

      # ==============================================
      # 8. Copy Notification Icon
      # ==============================================
      - name: Copy notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp public/assets/img/icon72.png android/app/src/main/res/drawable/ic_notification.png
          echo "Notification icon copied."

      # ==============================================
      # 9. Inject Permissions and Service
      # ==============================================
      - name: Inject Background Permissions and Service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Install xmlstarlet
          sudo apt-get update && sudo apt-get install -y xmlstarlet

          # Tambahkan izin jika belum ada
          if ! grep -q "ACCESS_BACKGROUND_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "FOREGROUND_SERVICE_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "POST_NOTIFICATIONS" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          fi

          # Tambahkan service menggunakan xmlstarlet
          if ! grep -q "com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" $MANIFEST; then
            xmlstarlet ed --inplace -N android="http://schemas.android.com/apk/res/android" \
              -s "/manifest/application" -t elem -n "service" -v "" \
              -i "/manifest/application/service[last()]" -t attr -n "android:name" -v "com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" \
              -i "/manifest/application/service[last()]" -t attr -n "android:permission" -v "android.permission.BIND_JOB_SERVICE" \
              -i "/manifest/application/service[last()]" -t attr -n "android:foregroundServiceType" -v "location" \
              $MANIFEST
          fi

          echo "=== Final AndroidManifest.xml ==="
          cat $MANIFEST
          echo "================================"

      # ==============================================
      # 10. Clean and Build APK
      # ==============================================
      - name: Clean and Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      # ==============================================
      # 11. Upload APK
      # ==============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kupastarif-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk