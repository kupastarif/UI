name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # ==============================================
      # 1. Siapkan folder public
      # ==============================================
      - name: Prepare web directory
        run: |
          mkdir public
          cp -r assets/ engine/ js/ index.html manifest.json sw.js public/
          echo "Web files copied to public/"

      # ==============================================
      # 2. Init Capacitor
      # ==============================================
      - name: Init Capacitor
        run: |
          npx cap init KupasTarif kupastarif.gk.app.id --web-dir=public

      # ==============================================
      # 3. Pastikan webDir = public
      # ==============================================
      - name: Set webDir to public
        run: |
          sed -i 's/"webDir": ".*"/"webDir": "public"/' capacitor.config.json
          cat capacitor.config.json

      # ==============================================
      # 4. Tambah platform Android
      # ==============================================
      - name: Add Android platform
        run: npx cap add android

      # ==============================================
      # 5. Sync Capacitor
      # ==============================================
      - name: Sync Capacitor
        run: npx cap sync

      # ==============================================
      # 6. Install @capacitor/assets (opsional, untuk generate icon otomatis)
      # ==============================================
      - name: Install @capacitor/assets
        run: npm install --save-dev @capacitor/assets

      # ==============================================
      # 7. Generate ikon menggunakan @capacitor/assets
      # ==============================================
      - name: Generate Android Icons
        run: |
          # Pastikan file sumber ikon ada (minimal 1024x1024)
          if [ -f "public/assets/img/icon.png" ]; then
            echo "Using icon.png"
          elif [ -f "public/assets/img/icon512.png" ]; then
            cp public/assets/img/icon512.png public/assets/img/icon.png
            echo "Using icon512.png as source"
          else
            echo "ERROR: No icon source found (icon.png or icon512.png)"
            exit 1
          fi
          # Generate semua asset Android (tanpa --icon)
          npx capacitor-assets generate --android

      # ==============================================
      # 8. Copy notification icon ke drawable
      # ==============================================
      - name: Copy notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp public/assets/img/icon72.png android/app/src/main/res/drawable/ic_notification.png
          echo "Notification icon copied."

      # ==============================================
      # 9. Inject permissions dan service ke AndroidManifest
      # ==============================================
      - name: Inject Background Permissions and Service
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Install xmlstarlet jika belum ada
          sudo apt-get update && sudo apt-get install -y xmlstarlet

          # Tambahkan izin jika belum ada
          if ! grep -q "ACCESS_BACKGROUND_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "FOREGROUND_SERVICE_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "POST_NOTIFICATIONS" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          fi

          # Tambahkan service menggunakan xmlstarlet
          if ! grep -q "com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" $MANIFEST; then
            xmlstarlet ed --inplace -N android="http://schemas.android.com/apk/res/android" \
              -s "/manifest/application" -t elem -n "service" -v "" \
              -i "/manifest/application/service[last()]" -t attr -n "android:name" -v "com.transistorsoft.backgroundgeolocation.BackgroundGeolocation" \
              -i "/manifest/application/service[last()]" -t attr -n "android:permission" -v "android.permission.BIND_JOB_SERVICE" \
              -i "/manifest/application/service[last()]" -t attr -n "android:foregroundServiceType" -v "location" \
              $MANIFEST
          fi

          echo "=== Final AndroidManifest.xml ==="
          cat $MANIFEST
          echo "================================"

      # ==============================================
      # 10. Bersihkan cache dan Build APK
      # ==============================================
      - name: Clean and Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      # ==============================================
      # 11. Upload APK
      # ==============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kupastarif-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk