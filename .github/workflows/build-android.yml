name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==============================================
      # 0. Checkout kode
      # ==============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ==============================================
      # 1. Setup Node.js (tanpa cache karena tidak ada lockfile)
      # ==============================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # cache: 'npm'   <- dihapus karena tidak ada package-lock.json

      # ==============================================
      # 2. Install dependencies (hanya npm install, tanpa ci)
      # ==============================================
      - name: Install dependencies
        run: npm install

      # ==============================================
      # 3. Setup Java
      # ==============================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ==============================================
      # 4. Setup Android SDK
      # ==============================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # ==============================================
      # 5. Siapkan folder public
      # ==============================================
      - name: Prepare web directory
        run: |
          mkdir public
          cp -r assets/ engine/ js/ index.html manifest.json sw.js public/
          echo "Web files copied to public/"

      # ==============================================
      # 6. Init Capacitor
      # ==============================================
      - name: Init Capacitor
        run: |
          npx cap init KupasTarif kupastarif.gk.app.id --web-dir=public

      - name: Set webDir to public
        run: |
          sed -i 's/"webDir": ".*"/"webDir": "public"/' capacitor.config.json
          cat capacitor.config.json

      # ==============================================
      # 7. Hapus folder android jika ada (clean state)
      # ==============================================
      - name: Remove existing android folder
        run: rm -rf android || true

      # ==============================================
      # 8. Add Android platform (membuat proyek default)
      # ==============================================
      - name: Add Android platform
        run: npx cap add android

      # ==============================================
      # 9. Buat AndroidManifest.xml kustom
      # ==============================================
      - name: Create custom AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="kupastarif.gk.app.id">

              <!-- Izin Internet (WAJIB) -->
              <uses-permission android:name="android.permission.INTERNET" />

              <!-- Izin Lokasi -->
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />

              <!-- Izin Foreground Service & Notifikasi -->
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <!-- Izin Penyimpanan -->
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />

              <!-- Izin Wake Lock -->
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation|density"
                      android:exported="true"
                      android:label="@string/title_activity_main"
                      android:launchMode="singleTask"
                      android:theme="@style/AppTheme.NoActionBarLaunch">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <!-- Provider default Capacitor untuk File Sharing -->
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>

              </application>

          </manifest>
          EOF
          echo "Custom AndroidManifest.xml created."

      # ==============================================
      # 10. Sync Capacitor
      # ==============================================
      - name: Sync Capacitor
        run: npx cap sync

      # ==============================================
      # 11. Set minSdkVersion & targetSdkVersion
      # ==============================================
      - name: Set Android SDK versions
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 29/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          echo "Android SDK versions set: min=29, target=34"

      # ==============================================
      # 12. Buat colors.xml untuk adaptive icon
      # ==============================================
      - name: Create colors.xml for adaptive icon
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="custom_ic_launcher_background">#0a1f1a</color>
          </resources>
          EOF
          echo "colors.xml created."

      # ==============================================
      # 13. Copy Launcher Icons
      # ==============================================
      - name: Copy Launcher Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

          echo "Launcher icons copied."

      # ==============================================
      # 14. Adaptive Icon XML
      # ==============================================
      - name: Create Adaptive Icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/custom_ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          echo "Adaptive icon created."

      # ==============================================
      # 15. Copy Notification Icon
      # ==============================================
      - name: Copy notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp public/assets/img/icon72.png android/app/src/main/res/drawable/ic_notification.png
          echo "Notification icon copied."

      # ==============================================
      # 16. Inject Permissions (jaga-jaga)
      # ==============================================
      - name: Inject Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "ACCESS_BACKGROUND_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "FOREGROUND_SERVICE_LOCATION" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />' $MANIFEST
          fi
          if ! grep -q "POST_NOTIFICATIONS" $MANIFEST; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          fi
          echo "Permissions injected."

      # ==============================================
      # 17. Clean dan Build APK
      # ==============================================
      - name: Clean and Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      # ==============================================
      # 18. Upload APK (artifact akan otomatis dihapus setelah 3 hari)
      # ==============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kupastarif-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3   # artefak otomatis dihapus setelah 3 hari

      # ==============================================
      # 19. Bersihkan folder sementara (tidak menggagalkan workflow jika gagal)
      # ==============================================
      - name: Clean temporary build folders
        continue-on-error: true
        run: |
          rm -rf android/
          rm -rf public/
          rm -rf node_modules/
          npm cache clean --force || true