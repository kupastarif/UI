name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==============================================
      # 0. Checkout kode
      # ==============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ==============================================
      # 1. Setup Node.js
      # ==============================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ==============================================
      # 2. Install dependencies
      # ==============================================
      - name: Install dependencies
        run: npm install

      # ==============================================
      # 3. Setup Java
      # ==============================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ==============================================
      # 4. Setup Android SDK & Accept Licenses
      # ==============================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      # ==============================================
      # 5. Tentukan versionCode otomatis (format YYYYMMDDHHMM)
      # ==============================================
      - name: Set versionCode
        id: version
        run: |
          VERSION_CODE=$(date +'%Y%m%d%H%M')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Version code set to $VERSION_CODE"

      # ==============================================
      # 6. Siapkan folder public (web assets)
      # ==============================================
      - name: Prepare web directory
        run: |
          mkdir public
          cp -r assets/ engine/ js/ index.html manifest.json sw.js public/
          echo "Web files copied to public/"

      # ==============================================
      # 7. Init Capacitor
      # ==============================================
      - name: Init Capacitor
        run: |
          npx cap init KupasTarif kupastarif.gk.app.id --web-dir=public

      - name: Set webDir to public
        run: |
          sed -i 's/"webDir": ".*"/"webDir": "public"/' capacitor.config.json
          cat capacitor.config.json

      # ==============================================
      # 8. Hapus folder android jika ada (clean state)
      # ==============================================
      - name: Remove existing android folder
        run: rm -rf android || true

      # ==============================================
      # 9. Add Android platform
      # ==============================================
      - name: Add Android platform
        run: npx cap add android

      # ==============================================
      # 10. Tambahkan semua izin yang diperlukan ke AndroidManifest
      # ==============================================
      - name: Add all required permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          perms=(
            "android.permission.INTERNET"
            "android.permission.ACCESS_COARSE_LOCATION"
            "android.permission.ACCESS_FINE_LOCATION"
            "android.permission.ACCESS_BACKGROUND_LOCATION"
            "android.permission.FOREGROUND_SERVICE"
            "android.permission.FOREGROUND_SERVICE_LOCATION"
            "android.permission.POST_NOTIFICATIONS"
            "android.permission.WRITE_EXTERNAL_STORAGE"
            "android.permission.READ_MEDIA_IMAGES"
            "android.permission.WAKE_LOCK"
          )
          for perm in "${perms[@]}"; do
            if ! grep -q "$perm" $MANIFEST; then
              sed -i "/<manifest/a\    <uses-permission android:name=\"$perm\" />" $MANIFEST
            fi
          done
          echo "All required permissions injected into AndroidManifest.xml"

      # ==============================================
      # 11. Buat build.gradle baru dari template (dengan signing config dan nilai literal)
      # ==============================================
      - name: Create build.gradle with signing config
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "kupastarif.gk.app.id"
              compileSdk 34

              defaultConfig {
                  applicationId "kupastarif.gk.app.id"
                  minSdkVersion 29
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                  aaptOptions {
                      ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
                  }
              }

              signingConfigs {
                  release {
                      storeFile file("$rootDir/keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }

          repositories {
              flatDir{
                  dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
              }
          }

          dependencies {
              implementation fileTree(include: ['*.jar'], dir: 'libs')
              implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
              implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
              implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
              implementation project(':capacitor-android')
              testImplementation "junit:junit:$junitVersion"
              androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
              androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
              implementation project(':capacitor-cordova-android-plugins')
          }

          apply from: 'capacitor.build.gradle'

          try {
              def servicesJSON = file('google-services.json')
              if (servicesJSON.text) {
                  apply plugin: 'com.google.gms.google-services'
              }
          } catch(Exception e) {
              logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
          }
          EOF

          # Ganti versionCode dan versionName
          sed -i "s/versionCode .*/versionCode ${{ env.VERSION_CODE }}/" android/app/build.gradle
          VERSION_NAME=$(node -p "require('./package.json').version")
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" android/app/build.gradle

          echo "build.gradle created with versionCode=${{ env.VERSION_CODE }} and signing config."

      # ==============================================
      # 12. Pulihkan keystore dari secret
      # ==============================================
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore.jks

      # ==============================================
      # 13. Sync Capacitor
      # ==============================================
      - name: Sync Capacitor
        run: npx cap sync android

      # ==============================================
      # 14. (Opsional) Periksa isi build.gradle untuk debugging
      # ==============================================
      - name: Show build.gradle for debugging
        run: cat android/app/build.gradle

      # ==============================================
      # 15. Buat colors.xml untuk adaptive icon
      # ==============================================
      - name: Create colors.xml for adaptive icon
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="custom_ic_launcher_background">#0a1f1a</color>
          </resources>
          EOF
          echo "colors.xml created."

      # ==============================================
      # 16. Copy Launcher Icons
      # ==============================================
      - name: Copy Launcher Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cp public/assets/img/icon48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp public/assets/img/icon72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp public/assets/img/icon96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp public/assets/img/icon192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

          echo "Launcher icons copied."

      # ==============================================
      # 17. Adaptive Icon XML
      # ==============================================
      - name: Create Adaptive Icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/custom_ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          echo "Adaptive icon created."

      # ==============================================
      # 18. Copy Notification Icon
      # ==============================================
      - name: Copy notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp public/assets/img/icon72.png android/app/src/main/res/drawable/ic_notification.png
          echo "Notification icon copied."

      # ==============================================
      # 19. Clean dan Build Release APK
      # ==============================================
      - name: Clean and Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ==============================================
      # 20. Upload APK Release
      # ==============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kupastarif-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3

      # ==============================================
      # 21. Bersihkan folder sementara (opsional)
      # ==============================================
      - name: Clean temporary build folders
        continue-on-error: true
        run: |
          rm -rf android/
          rm -rf public/
          rm -rf node_modules/
          npm cache clean --force || true